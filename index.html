<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Odisha | Ganpati Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Plus+Jakarta+Sans:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --saffron: #FF9933;
            --vermilion: #E34234;
            --gold: #FFD700;
            --deep-maroon: #4A0404;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at center, #2d0b0b 0%, #0a0101 100%);
            color: #fff;
            overflow-x: hidden;
        }

        .heading-ganpati { font-family: 'Cinzel', serif; }

        /* Floating Animation like Ganpati site */
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(1deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .floating { animation: float 4s ease-in-out infinite; }

        /* Saffron Glassmorphism */
        .glass-saffron {
            background: rgba(255, 153, 51, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 24px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .glass-saffron:hover {
            border-color: var(--saffron);
            box-shadow: 0 0 30px rgba(255, 153, 51, 0.3);
            transform: scale(1.02);
        }

        .gold-gradient {
            background: linear-gradient(135deg, #FFD700, #FF9933);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-sticky {
            background: rgba(10, 1, 1, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 215, 0, 0.1);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--saffron); border-radius: 10px; }
    </style>
</head>
<body class="pb-20">

    <nav class="nav-sticky sticky top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3 floating">
                <i class="fa-solid fa-om text-3xl text-orange-500"></i>
                <h1 class="heading-ganpati text-2xl font-bold tracking-widest gold-gradient">ODISHA YATRA</h1>
            </div>

            <div class="flex items-center gap-3 w-full md:w-auto">
                <div class="relative w-full">
                    <input type="text" id="search" onkeyup="render()" placeholder="Search Temples & Lakes..." 
                    class="w-full md:w-64 bg-white/5 border border-white/10 rounded-full py-2 px-10 outline-none focus:border-orange-500 transition">
                    <i class="fa fa-search absolute left-4 top-3 text-gray-500 text-sm"></i>
                </div>
                <button onclick="toggleWish()" id="wishBtn" class="p-2.5 glass-saffron rounded-full hover:text-red-500 transition"><i class="fa-solid fa-heart"></i></button>
            </div>
        </div>
    </nav>

    <header class="max-w-7xl mx-auto px-6 pt-16 text-center">
        <h2 class="heading-ganpati text-5xl md:text-7xl font-black mb-4">Discover the <span class="gold-gradient">Divine</span></h2>
        <p class="text-orange-200/60 max-w-2xl mx-auto text-sm tracking-widest uppercase mb-12">20 Ranked Holy Destinations for 2026</p>
        
        <div class="flex justify-center gap-3 overflow-x-auto pb-4 no-scrollbar" id="filters">
            <button onclick="setFilter('all', this)" class="chip active bg-orange-600 px-6 py-2 rounded-full text-xs font-bold uppercase tracking-wider">All Yatras</button>
            <button onclick="setFilter('spiritual', this)" class="chip border border-white/10 px-6 py-2 rounded-full text-xs font-bold uppercase tracking-wider hover:bg-white/5">Spiritual</button>
            <button onclick="setFilter('nature', this)" class="chip border border-white/10 px-6 py-2 rounded-full text-xs font-bold uppercase tracking-wider hover:bg-white/5">Nature</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            </div>
    </main>

    <div class="fixed bottom-8 right-8 z-[100] flex flex-col items-end gap-4">
        <div id="ai-box" class="hidden w-80 glass-saffron p-6 mb-4 shadow-2xl border-orange-500/50">
            <h4 class="heading-ganpati gold-gradient border-b border-orange-500/20 pb-2 mb-4">Yatra Guide</h4>
            <div id="chat-content" class="h-48 overflow-y-auto text-sm space-y-3 mb-4 pr-2">
                <p class="text-gray-400 italic text-xs">Namaste! How can I help you plan your Odisha tour today?</p>
            </div>
            <div class="flex gap-2">
                <input type="text" id="ai-in" placeholder="Ask for 3-day plan..." class="bg-black/40 text-xs p-2 rounded-lg w-full outline-none border border-white/10">
                <button onclick="askAI()" class="text-orange-500"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
        <button onclick="document.getElementById('ai-box').classList.toggle('hidden')" 
        class="h-16 w-16 bg-orange-600 rounded-2xl shadow-[0_0_20px_rgba(255,153,51,0.5)] flex items-center justify-center text-2xl floating">
            <i class="fa-solid fa-om"></i>
        </button>
    </div>

    <script>
        const spots = [
            { id:1, name: "Konark Temple", type: "spiritual", rank: 1, lat: 19.88, lon: 86.09, img: "https://images.unsplash.com/photo-1620668045952-19e99279092d?auto=format&fit=crop&w=500", tag: "Sun Temple" },
            { id:2, name: "Jagannath Puri", type: "spiritual", rank: 2, lat: 19.81, lon: 85.81, img: "https://images.unsplash.com/photo-1599661046827-dacff0c0f09a?auto=format&fit=crop&w=500", tag: "Holy Chardham" },
            { id:3, name: "Chilika Lake", type: "nature", rank: 3, lat: 19.67, lon: 85.31, img: "https://images.unsplash.com/photo-1588613437203-d667c2692237?auto=format&fit=crop&w=500", tag: "Dolphin Lagoon" },
            { id:4, name: "Similipal Forest", type: "nature", rank: 4, lat: 21.93, lon: 86.41, img: "https://images.unsplash.com/photo-1589136109968-364e7c1f8876?auto=format&fit=crop&w=500", tag: "Tiger Reserve" }
            // ... (Keep adding the rest)
        ];

        let wishlist = JSON.parse(localStorage.getItem('wish')) || [];
        let filter = 'all';

        function render() {
            const grid = document.getElementById('grid');
            const searchVal = document.getElementById('search').value.toLowerCase();
            
            const filtered = spots.filter(s => {
                const sMatch = s.name.toLowerCase().includes(searchVal);
                const fMatch = filter === 'all' || s.type === filter;
                return sMatch && fMatch;
            });

            grid.innerHTML = filtered.map(s => {
                const isFav = wishlist.includes(s.id) ? 'text-orange-500' : 'text-gray-600';
                return `
                <div class="glass-saffron overflow-hidden group">
                    <div class="h-56 relative overflow-hidden">
                        <img src="${s.img}" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                        <div class="absolute inset-0 bg-gradient-to-t from-[#2d0b0b] to-transparent"></div>
                        <span class="absolute top-4 left-4 bg-orange-600 text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-tighter">${s.tag}</span>
                    </div>
                    <div class="p-6">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="heading-ganpati text-lg gold-gradient font-bold">${s.name}</h3>
                            <span class="text-xs font-black text-orange-200/40">#${s.rank}</span>
                        </div>
                        <div class="flex justify-between items-center border-t border-white/5 pt-4">
                            <i class="fa-solid fa-heart cursor-pointer ${isFav}" onclick="toggleWish(${s.id})"></i>
                            <a href="https://maps.google.com/?q=${s.lat},${s.lon}" target="_blank" class="text-orange-400 hover:scale-125 transition">
                                <i class="fa-solid fa-location-dot"></i>
                            </a>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function toggleWish(id) {
            if(wishlist.includes(id)) wishlist = wishlist.filter(x => x !== id);
            else wishlist.push(id);
            localStorage.setItem('wish', JSON.stringify(wishlist));
            render();
        }

        function setFilter(type, btn) {
            filter = type;
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('bg-orange-600', 'border-none'));
            btn.classList.add('bg-orange-600');
            render();
        }

        function askAI() {
            const input = document.getElementById('ai-in').value.toLowerCase();
            const box = document.getElementById('chat-content');
            let res = "That sounds like a beautiful plan!";
            if(input.includes("3 day")) res = "🚩 Day 1: Puri & Konark. Day 2: Chilika Lake. Day 3: Bhubaneswar Temples.";
            
            box.innerHTML += `<p class="text-right text-orange-400 font-bold text-xs">${input}</p>`;
            box.innerHTML += `<p class="text-left text-gray-200 text-xs">${res}</p>`;
            document.getElementById('ai-in').value = "";
            box.scrollTop = box.scrollHeight;
        }

        window.onload = render;
    </script>
</body>
</html>
